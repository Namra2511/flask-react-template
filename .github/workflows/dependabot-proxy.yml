name: Dependabot Proxy Runner

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: read
  actions: write
  pull-requests: read

jobs:
  proxy:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    name: "Dependabot Secure Proxy Runner"

    steps:
      - name: Install GitHub CLI
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gh

      - name: Authenticate GitHub CLI (non-interactive)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "${GH_TOKEN}" > token.txt
          gh auth login --hostname github.com --with-token < token.txt
          gh auth status

      - name: Trigger secure workflow runs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Detected Dependabot PR — triggering workflows securely using GH_TOKEN..."

          # Trigger CI workflow
          gh workflow run ci.yml -r ${{ github.event.pull_request.head.ref }}

          # Trigger CD workflow
          gh workflow run cd.yml -r ${{ github.event.pull_request.head.ref }}

      - name: Confirm Trigger
        run: echo "✅ Proxy successfully triggered secure workflows under authenticated org context."
